name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Offline suite: pipelines run against the bundled fake `claude` binary,
      # so no API key or Claude Code install is needed.
      - name: Test
        run: npm test

      - name: Pack check (plugin ships in the tarball)
        run: |
          npm pack --dry-run 2>&1 | tee pack.log
          grep -q "plugin/.claude-plugin/plugin.json" pack.log
          grep -q "dist/cli.js" pack.log
